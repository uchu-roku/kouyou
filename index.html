<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>広葉樹管理ツール（v2.0.1-recover）</title>
<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin></script>
<!-- PapaParse -->
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg:#0f172a; --panel:#111827; --text:#e5e7eb; --muted:#94a3b8; --accent:#22d3ee;
    --ok:#10b981; --warn:#f59e0b; --bad:#ef4444;
  }
  html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:system-ui, -apple-system, Segoe UI, Roboto, 'Hiragino Sans', "Noto Sans JP", sans-serif}
  .wrap{display:grid;grid-template-columns:320px 1fr 340px;grid-template-rows:auto 1fr;gap:8px;height:100vh}
  header{grid-column:1/4;background:#111827;padding:8px 12px;display:flex;align-items:center;gap:12px}
  header h1{font-size:16px;margin:0}
  header .tag{margin-left:auto;font-size:12px;color:var(--muted)}
  #left,#right{background:var(--panel);border-radius:12px;padding:10px;overflow:auto}
  #map{border-radius:12px}
  .section{margin-bottom:12px}
  .section h2{font-size:14px;margin:0 0 6px;color:#cbd5e1}
  .file{display:flex;gap:8px;align-items:center}
  input[type=file]{font-size:12px}
  .hint{font-size:12px;color:var(--muted)}
  .legend{display:flex;flex-wrap:wrap;gap:6px}
  .legend-item{display:flex;align-items:center;gap:6px;background:#0b1220;border:1px solid #1f2937;padding:6px 8px;border-radius:8px}
  .badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;border:1px solid #1f2937;user-select:none}
  .summary table{width:100%;border-collapse:collapse;font-size:12px}
  .summary th,.summary td{padding:6px;border-bottom:1px solid #1f2937;text-align:right}
  .summary th:first-child,.summary td:first-child{text-align:left}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{padding:6px 8px;border-radius:999px;background:#0b1220;border:1px solid #1f2937;font-size:12px}
  .footer{font-size:11px;color:var(--muted);margin-top:6px}
  .drop{border:1px dashed #334155;border-radius:8px;padding:10px}
  .btn{appearance:none;border:1px solid #334155;background:#0b1220;padding:6px 10px;border-radius:8px;color:var(--text);font-size:12px;cursor:pointer}
  .btn:hover{border-color:#475569}
  .marker-label{position:absolute;transform:translate(-50%, -32px);white-space:nowrap;background:#0b1220aa;color:#e5e7eb;padding:2px 6px;border-radius:6px;border:1px solid #1f2937;font-size:11px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>広葉樹管理ツール <span style="opacity:.7">（v2.0.1-recover）</span></h1>
    <span class="tag">OSMベースマップ / 樹種凡例 / 種別サマリ 復旧版</span>
  </header>

  <aside id="left">
    <div class="section">
      <h2>データ読み込み（CSV/GeoJSON）</h2>
      <div class="file">
        <input id="file" type="file" accept=".csv,.geojson,.json" />
        <button class="btn" id="demo">デモ表示</button>
      </div>
      <div id="drop" class="drop hint" style="margin-top:8px">ここにファイルをドラッグ＆ドロップしても読み込めます</div>
      <div class="hint" style="margin-top:6px">必要な列例：<code>lat, lon, species, dbh_cm, volume_m3, profit_jpy</code></div>
    </div>

    <div class="section">
      <h2>樹種凡例（マップ・サマリと共通アイコン）</h2>
      <div id="legend" class="legend"></div>
    </div>
    <div class="section">
      <h2>表示フィルタ</h2>
      <div class="chips" id="filters"></div>
    </div>
  </aside>

  <main id="map"></main>

  <aside id="right">
    <div class="section summary">
      <h2>種別サマリ</h2>
      <table id="summary">
        <thead><tr><th>樹種</th><th>本数</th><th>総材積(m³)</th><th>総利益(円)</th></tr></thead>
        <tbody></tbody>
        <tfoot><tr><th>合計</th><th id="t_cnt">0</th><th id="t_vol">0</th><th id="t_prof">0</th></tr></tfoot>
      </table>
      <div class="footer">凡例・サマリ・マップのアイコンは同一関数から生成し常に一致します。</div>
    </div>
  </aside>
</div>

<script>
// ---- 共有のアイコン定義とファクトリ（凡例・サマリ・マップで共通使用） ----
const SPECIES_DEF = {
  "ミズナラ": { emoji:"🌳", bg:"#14532d" },
  "シラカバ": { emoji:"🪵", bg:"#1f2937" },
  "ハルニレ": { emoji:"🍃", bg:"#064e3b" },
  "イタヤカエデ": { emoji:"🍁", bg:"#3f1d2b" },
  "ヤチダモ": { emoji:"🌿", bg:"#064e3b" },
  // 針葉樹など他の候補（CSVに現れたら自動でレジェンドへ追加）
  "アカエゾマツ": { emoji:"🌲", bg:"#0f3b2e" },
  "トドマツ": { emoji:"🌲", bg:"#0b3a2a" },
  "カラマツ": { emoji:"🌲", bg:"#1f3d2e" }
};
function getSpeciesStyle(name){
  return SPECIES_DEF[name] || { emoji:"🌲", bg:"#334155" };
}
function makeBadgeHTML(name){
  const {emoji, bg} = getSpeciesStyle(name);
  return `<span class="badge" style="background:${bg}">${emoji}</span>`;
}
function makeDivIcon(name){
  const {emoji, bg} = getSpeciesStyle(name);
  return L.divIcon({
    className: "",
    html: `<div style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;border:1px solid #1f2937;background:${bg};font-size:16px">${emoji}</div>`,
    iconSize: [28,28],
    iconAnchor: [14,14]
  });
}

// ---- マップ初期化（OSMベースマップ復旧） ----
const map = L.map('map', { zoomControl:true }).setView([43.06,141.35], 10); // 札幌近辺
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors'
}).addTo(map);

let layerGroup = L.layerGroup().addTo(map);
let currentData = [];
let activeSpecies = new Set(); // 空なら全表示

// ---- 凡例（SPECIES_DEF + データ出現種） ----
function renderLegend(speciesList){
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  speciesList.forEach(sp => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `${makeBadgeHTML(sp)}<span>${sp}</span>`;
    legend.appendChild(item);
  });
}

// ---- 種別サマリ ----
function renderSummary(rows){
  const tbody = document.querySelector('#summary tbody');
  tbody.innerHTML = '';
  let tCnt=0, tVol=0, tProf=0;
  const by = {};
  rows.forEach(r => {
    if (!r.species) return;
    if (activeSpecies.size && !activeSpecies.has(r.species)) return;
    if (!by[r.species]) by[r.species] = {cnt:0, vol:0, prof:0};
    by[r.species].cnt++;
    by[r.species].vol += (Number(r.volume_m3)||0);
    by[r.species].prof += (Number(r.profit_jpy)||0);
  });
  Object.entries(by).sort((a,b)=>b[1].cnt-a[1].cnt).forEach(([sp, v]) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${makeBadgeHTML(sp)} ${sp}</td>`+
                   `<td>${v.cnt.toLocaleString()}</td>`+
                   `<td>${v.vol.toFixed(2)}</td>`+
                   `<td>${Math.round(v.prof).toLocaleString()}</td>`;
    tbody.appendChild(tr);
    tCnt += v.cnt; tVol += v.vol; tProf += v.prof;
  });
  document.getElementById('t_cnt').textContent = tCnt.toLocaleString();
  document.getElementById('t_vol').textContent = tVol.toFixed(2);
  document.getElementById('t_prof').textContent = Math.round(tProf).toLocaleString();
}

// ---- フィルタ（樹種チップ） ----
function renderFilters(speciesList){
  const box = document.getElementById('filters');
  box.innerHTML = '';
  speciesList.forEach(sp => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    const on = activeSpecies.has(sp);
    btn.style.outline = on ? '2px solid var(--accent)' : 'none';
    btn.innerHTML = `${makeBadgeHTML(sp)} ${sp}`;
    btn.onclick = () => {
      if (activeSpecies.has(sp)) activeSpecies.delete(sp); else activeSpecies.add(sp);
      drawMarkers(currentData);
    };
    box.appendChild(btn);
  });
  // クリア
  const clr = document.createElement('button');
  clr.className = 'chip';
  clr.textContent = 'フィルタ解除';
  clr.onclick = ()=>{ activeSpecies.clear(); drawMarkers(currentData); };
  box.appendChild(clr);
}

// ---- マーカー描画（凡例/サマリと同一アイコンを使用） ----
function drawMarkers(rows){
  layerGroup.clearLayers();
  const spSet = new Set();
  rows.forEach(r => { if (r.species) spSet.add(r.species); });
  const speciesList = Array.from(spSet);
  renderLegend(speciesList);
  renderFilters(speciesList);

  const pts = [];
  rows.forEach(r => {
    const lat = Number(r.lat), lon = Number(r.lon);
    if (!isFinite(lat) || !isFinite(lon)) return;
    if (activeSpecies.size && !activeSpecies.has(r.species)) return;
    const m = L.marker([lat, lon], { icon: makeDivIcon(r.species) }).addTo(layerGroup);
    const label = document.createElement('div');
    label.className = 'marker-label';
    label.textContent = `${r.species || '不明'} / ${r.dbh_cm||'-'}cm / ${r.volume_m3||'-'}m³`;
    const labelOverlay = L.popup({ autoClose:false, closeButton:false, closeOnClick:false, className:'', maxWidth:200 })
      .setLatLng([lat, lon])
      .setContent(label);
    m.bindPopup(`<b>${r.species || '不明'}</b><br>胸高直径: ${r.dbh_cm||'-'} cm<br>材積: ${r.volume_m3||'-'} m³<br>利益: ${r.profit_jpy? Number(r.profit_jpy).toLocaleString()+' 円':'-'}<br>(${lat.toFixed(5)}, ${lon.toFixed(5)})`);
    pts.push([lat, lon]);
  });
  renderSummary(rows);
  if (pts.length){ map.fitBounds(pts, { padding:[30,30] }); }
}

// ---- CSV/GeoJSON ローダ ----
function normalizeRows(input){
  // CSV: ヘッダ名の揺れを許容
  return input.map(o => ({
    lat: o.lat ?? o.latitude ?? o.Lat ?? o.Latitude ?? o.y ?? '',
    lon: o.lon ?? o.longitude ?? o.Lon ?? o.Longitude ?? o.x ?? '',
    species: o.species ?? o.樹種 ?? o.Species ?? o.tree ?? '',
    dbh_cm: o.dbh_cm ?? o.DBH ?? o.dbh ?? o.胸高直径 ?? '',
    volume_m3: o.volume_m3 ?? o.volume ?? o.材積 ?? '',
    profit_jpy: o.profit_jpy ?? o.profit ?? o.利益 ?? ''
  }));
}

async function loadFile(file){
  const ext = (file.name.split('.').pop()||'').toLowerCase();
  if (ext === 'csv'){
    Papa.parse(file, { header:true, skipEmptyLines:true, complete: res => {
      currentData = normalizeRows(res.data);
      drawMarkers(currentData);
    }});
  } else if (ext === 'geojson' || ext === 'json'){
    const txt = await file.text();
    const gj = JSON.parse(txt);
    const rows = (gj.features||[]).map(f => ({
      lat: f.geometry?.coordinates?.[1],
      lon: f.geometry?.coordinates?.[0],
      species: f.properties?.species || f.properties?.樹種,
      dbh_cm: f.properties?.dbh_cm || f.properties?.胸高直径,
      volume_m3: f.properties?.volume_m3 || f.properties?.材積,
      profit_jpy: f.properties?.profit_jpy || f.properties?.利益,
    }));
    currentData = normalizeRows(rows);
    drawMarkers(currentData);
  } else {
    alert('CSV または GeoJSON を指定してください');
  }
}

// ---- D&D と入力 ----
const fileInput = document.getElementById('file');
fileInput.addEventListener('change', e => {
  if (e.target.files?.[0]) loadFile(e.target.files[0]);
});
const drop = document.getElementById('drop');
;['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev, e=>{e.preventDefault(); drop.style.background='#0b1220';}));
;['dragleave','drop'].forEach(ev=>drop.addEventListener(ev, e=>{e.preventDefault(); drop.style.background='transparent';}));
drop.addEventListener('drop', e=>{
  const f = e.dataTransfer.files?.[0]; if (f) loadFile(f);
});

// ---- デモデータ（最小限） ----
const DEMO = [
  {lat:43.0619, lon:141.3544, species:'ミズナラ', dbh_cm:36, volume_m3:0.78, profit_jpy:12000},
  {lat:43.0500, lon:141.3400, species:'シラカバ', dbh_cm:28, volume_m3:0.42, profit_jpy:6000},
  {lat:43.0800, lon:141.3600, species:'ハルニレ', dbh_cm:40, volume_m3:0.95, profit_jpy:15000},
  {lat:43.0700, lon:141.3800, species:'イタヤカエデ', dbh_cm:32, volume_m3:0.60, profit_jpy:10000},
  {lat:43.0400, lon:141.3300, species:'ヤチダモ', dbh_cm:30, volume_m3:0.55, profit_jpy:9000}
];

function loadDemo(){
  currentData = normalizeRows(DEMO);
  drawMarkers(currentData);
}

document.getElementById('demo').addEventListener('click', loadDemo);

// 初期表示は空（必要ならデモ自動表示に切替可）
</script>
</body>
</html>
